name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests (pure logic — C core + Swift core, no hardware needed)
        run: bash tests/run-tests.sh

      - name: Install mingw-w64 (DLL cross-build) + shellcheck
        run: brew install mingw-w64 shellcheck

      - name: Build wintab32.dll
        run: |
          cd wintab-src
          x86_64-w64-mingw32-windres wintab32.rc -O coff -o wintab32_res.o
          x86_64-w64-mingw32-gcc -shared -O2 -o wintab32.dll \
            wintab32.c wintab32_res.o wintab32.def \
            -lgdi32 -luser32 -lws2_32 -municode
          test -f wintab32.dll

      - name: Build the native helper
        run: |
          cd wacom-helper
          swiftc -O -o wacom-pressure-helper main.swift PressureCore.swift
          test -x wacom-pressure-helper
          # --version must print and EXIT (a hang here means the flag regressed)
          ./wacom-pressure-helper --version

      - name: Build the .app bundle
        run: bash make-app.sh

      - name: Validate the .app bundle
        run: |
          APP="dist/SAI Pen Pressure.app"
          test -d "$APP"
          # main executable must be a real Mach-O binary (a script here breaks
          # downloaded apps with error -47 — regression guard)
          file "$APP/Contents/MacOS/SAIPenPressure" | grep -q "Mach-O"
          test -f "$APP/Contents/Resources/wintab32.dll"
          test -f "$APP/Contents/Resources/install-wine.sh"
          test -f "$APP/Contents/Resources/AppIcon.icns"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP/Contents/Info.plist" | grep -qx "SAIPenPressure"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist"

      - name: Lint shell scripts (shellcheck)
        run: shellcheck -S error install.sh install-wine.sh make-app.sh tests/run-tests.sh

      - name: Upload the built app (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SAI-Pen-Pressure-app
          path: dist/SAI Pen Pressure.app

      # Non-blocking: an external check (GitHub API can rate-limit shared CI IPs),
      # so it warns but never fails the build. Uses the built-in token for a
      # higher rate limit.
      - name: Sanity-check the Wine download URL is still resolvable
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/Gcenx/macOS_Wine_builds/releases?per_page=30" \
                | grep -oiE 'https://[^"]+staging[^"]+osx64[^"]*\.tar\.xz' | head -1 || true)
          echo "resolved: ${URL:-<none>}"
          test -n "$URL"
