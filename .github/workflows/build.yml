name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 (for the wintab32.dll cross-build)
        run: brew install mingw-w64

      - name: Build wintab32.dll
        run: |
          cd wintab-src
          x86_64-w64-mingw32-windres wintab32.rc -O coff -o wintab32_res.o
          x86_64-w64-mingw32-gcc -shared -O2 -o wintab32.dll \
            wintab32.c wintab32_res.o wintab32.def \
            -lgdi32 -luser32 -lws2_32 -municode
          test -f wintab32.dll

      - name: Build the native helper
        run: |
          cd wacom-helper
          swiftc -O -o wacom-pressure-helper main.swift
          test -x wacom-pressure-helper

      - name: Build the .app bundle
        run: |
          bash make-app.sh
          test -d "dist/SAI Pen Pressure.app"
          test -f "dist/SAI Pen Pressure.app/Contents/Resources/wintab32.dll"
          test -f "dist/SAI Pen Pressure.app/Contents/Resources/install-wine.sh"

      - name: Lint shell scripts
        run: |
          for f in install.sh install-wine.sh make-app.sh; do
            echo "checking $f"; bash -n "$f"
          done

      # Non-blocking: an external check (GitHub API can rate-limit shared CI IPs),
      # so it warns but never fails the build. Uses the built-in token for a
      # higher rate limit.
      - name: Sanity-check the Wine download URL is still resolvable
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/Gcenx/macOS_Wine_builds/releases?per_page=30" \
                | grep -oiE 'https://[^"]+staging[^"]+osx64[^"]*\.tar\.xz' | head -1 || true)
          echo "resolved: ${URL:-<none>}"
          test -n "$URL"
